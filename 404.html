<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Not found · Aura OS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100vh; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
    background: #eef0fb; color: #1a1f3a;
    display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;
  }
  .card {
    position: relative; background: #ffffff; border: 1px solid rgba(63, 74, 180, 0.16);
    border-radius: 18px; box-shadow: 0 22px 55px rgba(0, 24, 94, 0.14);
    padding: 40px 44px; text-align: center; max-width: 460px; overflow: hidden;
  }
  .card::before {
    content: ""; position: absolute; top: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #3f4ab4 0%, #00185e 100%);
  }
  .wordmark { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
  .wordmark .os { color: #3f4ab4; }
  h1 { font-size: 17px; margin: 18px 0 6px; }
  p { font-size: 13.5px; color: #44496b; line-height: 1.5; }
  a { display: inline-block; margin-top: 18px; font-size: 13px; font-weight: 700; color: #fff;
      background: #3f4ab4; text-decoration: none; padding: 10px 18px; border-radius: 8px; }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Aura<span class="os">&nbsp;OS</span></div>
    <h1>Page not found</h1>
    <p>This link points somewhere that does not exist. Head back to the entrance and enter the passcode.</p>
    <a href="./">Go to the one-pager</a>
  </div>
</body>
</html>
